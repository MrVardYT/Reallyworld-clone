<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReallyWorld</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #0f0f0f; color: white; }
        img { width: 180px; margin: 10px; border: 2px solid #444; }
        .missing { border-color: red; }
    </style>
</head>
<body>
    <h1>ReallyWorld — Проверка GitHub Pages</h1>
    
    <h2>Проверка изображений:</h2>
    <img src="images/chest.png" onerror="this.classList.add('missing'); this.alt='❌ chest.png'">
    <img src="images/god2.png" onerror="this.classList.add('missing'); this.alt='❌ god2.png'">
    <img src="images/IMPERATOR.png" onerror="this.classList.add('missing'); this.alt='❌ IMPERATOR.png'">
    <img src="images/HELPER.png" onerror="this.classList.add('missing'); this.alt='❌ HELPER.png'">
    <img src="images/DRAGON.png" onerror="this.classList.add('missing'); this.alt='❌ DRAGON.png'">

    <p>Если видишь ❌ — папка images/ не загружена на GitHub.</p>
</body>
</html>
